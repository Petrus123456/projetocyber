version: "3"

services:

  firewall:
    image: ubuntu:20.04
    container_name: firewall
    privileged: true
    command: sleep infinity
    networks:
      external_net:
      dmz_net:
      internal_net:

  dvwa:
    image: vulnerables/web-dvwa
    container_name: dvwa
    ports:
      - "8080:80"
    depends_on:
      - firewall
      - db
    networks:
      - dmz_net

  db:
    image: mysql:5.7
    container_name: db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: dvwa
      MYSQL_USER: dvwa
      MYSQL_PASSWORD: dvwa
    networks:
      - internal_net

  attacker:
    image: ubuntu:20.04
    container_name: attacker
    stdin_open: true
    tty: true
    command: /bin/bash
    networks:
      - external_net

networks:
  external_net:
  dmz_net:
  internal_net:
